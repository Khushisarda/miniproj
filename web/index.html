<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetSeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b0f;
            --bg2: #0d1117;
            --bg3: #111820;
            --card: #0f161e;
            --border: rgba(0, 212, 170, 0.1);
            --border2: rgba(255,255,255,0.06);
            --accent: #00d4aa;
            --accent2: #00f5c4;
            --accent-dim: rgba(0, 212, 170, 0.08);
            --accent-glow: rgba(0, 212, 170, 0.15);
            --easy: #4ade80;
            --medium: #fbbf24;
            --hard: #f87171;
            --text: #e8edf2;
            --text2: #7a8899;
            --text3: #3d4e5e;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --r: 12px;
            --r2: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 10% 0%, rgba(0,212,170,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 90% 100%, rgba(0,212,170,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── LAYOUT ─────────────────────────────────── */
        .app {
            display: none; /* STARTS HIDDEN UNTIL AUTHENTICATED */
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* ─── HEADER ─────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border2);
            background: rgba(8,11,15,0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--bg);
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .logo-text span { color: var(--accent); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .refresh-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border2);
            background: var(--bg3);
            color: var(--text2);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all 0.2s;
        }

        .refresh-btn:hover { color: var(--accent); border-color: var(--accent); }
        .refresh-btn.spinning svg { animation: spin 1s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .add-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.1rem;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: var(--r2);
            font-family: 'Syne', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-btn:hover { background: var(--accent2); transform: translateY(-1px); }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--text2);
        }
        .logout-btn:hover {
            border-color: var(--hard);
            color: var(--hard);
            background: rgba(248,113,113,0.1);
        }

        /* ─── NAV TABS ───────────────────────────────── */
        .nav-tabs {
            display: flex;
            gap: 0;
            padding: 0 2rem;
            border-bottom: 1px solid var(--border2);
            background: rgba(8,11,15,0.85);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 65px;
            z-index: 99;
        }

        .nav-tab {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text2);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: -1px;
        }

        .nav-tab:hover { color: var(--text); }

        .nav-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .nav-tab svg { opacity: 0.7; }
        .nav-tab.active svg { opacity: 1; }

        /* ─── CONTENT ────────────────────────────────── */
        .content {
            padding: 2rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .tab-panel { display: none; animation: fadeIn 0.3s ease; }
        .tab-panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── LEADERBOARD TAB ────────────────────────── */
        .lb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .lb-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .lb-subtitle { font-size: 0.8rem; color: var(--text2); margin-top: 0.2rem; }

        .podium {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: end;
        }

        .podium-card {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            padding: 1.5rem 1rem;
            text-align: center;
            position: relative;
            transition: all 0.3s;
        }

        .podium-card:hover { transform: translateY(-3px); border-color: var(--border); }

        .podium-card.rank-1 {
            border-color: rgba(255,215,0,0.3);
            background: linear-gradient(160deg, rgba(255,215,0,0.05) 0%, var(--card) 60%);
            padding-top: 2rem;
        }

        .podium-card.rank-2 {
            border-color: rgba(192,192,192,0.2);
            background: linear-gradient(160deg, rgba(192,192,192,0.04) 0%, var(--card) 60%);
        }

        .podium-card.rank-3 {
            border-color: rgba(205,127,50,0.2);
            background: linear-gradient(160deg, rgba(205,127,50,0.04) 0%, var(--card) 60%);
        }

        .podium-rank {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .podium-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            margin: 0 auto 0.75rem;
            display: grid;
            place-items: center;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .rank-1 .podium-avatar { background: rgba(255,215,0,0.15); color: var(--gold); border: 2px solid rgba(255,215,0,0.4); }
        .rank-2 .podium-avatar { background: rgba(192,192,192,0.1); color: var(--silver); border: 2px solid rgba(192,192,192,0.3); }
        .rank-3 .podium-avatar { background: rgba(205,127,50,0.1); color: var(--bronze); border: 2px solid rgba(205,127,50,0.3); }

        .podium-name {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .podium-handle {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--text2);
            margin-bottom: 0.75rem;
        }

        .podium-total {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--accent);
        }

        .podium-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }

        /* Rank list */
        .rank-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .rank-row {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            align-items: center;
            gap: 1rem;
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r2);
            padding: 0.875rem 1.25rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .rank-row:hover { border-color: var(--border); background: var(--bg3); transform: translateX(4px); }

        .rank-num {
            font-family: 'DM Mono', monospace;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text3);
            text-align: center;
        }

        .rank-row-info { display: flex; align-items: center; gap: 0.875rem; }

        .rank-avatar-sm {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--bg3);
            border: 1px solid var(--border2);
            display: grid;
            place-items: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }

        .rank-row-name { font-size: 0.95rem; font-weight: 600; }
        .rank-row-handle { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--text2); }

        .rank-row-right { text-align: right; }

        .rank-total { font-size: 1.1rem; font-weight: 800; color: var(--accent); }

        .rank-breakdown {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 0.2rem;
        }

        .diff-badge {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
        }

        .diff-badge.easy { background: rgba(74,222,128,0.12); color: var(--easy); }
        .diff-badge.medium { background: rgba(251,191,36,0.12); color: var(--medium); }
        .diff-badge.hard { background: rgba(248,113,113,0.12); color: var(--hard); }

        /* Bar chart for leaderboard */
        .bar-wrap { width: 100%; margin-top: 0.4rem; }
        .bar-track { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }

        /* ─── FRIENDS TAB ────────────────────────────── */
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
        }

        .friend-card {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .friend-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .friend-card:hover { border-color: var(--border); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
        .friend-card:hover::after { opacity: 1; }

        .friend-card-top {
            padding: 1.25rem 1.25rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .friend-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--bg3);
            border: 2px solid var(--border2);
            display: grid;
            place-items: center;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--accent);
            flex-shrink: 0;
        }

        .friend-meta { flex: 1; min-width: 0; }
        .friend-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .friend-handle { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text2); }

        .activity-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            background: rgba(0,212,170,0.12);
            color: var(--accent);
            border: 1px solid rgba(0,212,170,0.25);
            white-space: nowrap;
            animation: pulse-badge 2s ease infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,170,0.3); }
            50% { box-shadow: 0 0 0 4px rgba(0,212,170,0); }
        }

        .friend-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            border-top: 1px solid var(--border2);
            border-bottom: 1px solid var(--border2);
        }

        .fstat {
            padding: 0.875rem 0;
            text-align: center;
            position: relative;
        }

        .fstat + .fstat::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 1px;
            background: var(--border2);
        }

        .fstat-val { font-size: 1.3rem; font-weight: 800; display: block; }
        .fstat-val.easy { color: var(--easy); }
        .fstat-val.medium { color: var(--medium); }
        .fstat-val.hard { color: var(--hard); }
        .fstat-label { font-size: 0.65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 0.1rem; }

        .friend-card-bottom {
            padding: 0.875rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .last-problem {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.78rem;
            color: var(--text2);
            min-width: 0;
        }

        .last-problem svg { flex-shrink: 0; color: var(--text3); }
        .last-problem-title {
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-decoration: none;
            font-family: 'DM Mono', monospace;
        }

        .last-problem-title:hover { text-decoration: underline; }

        .total-chip {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text);
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 0.3rem 0.6rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ─── PROFILE TAB ────────────────────────────── */
        .profile-selector {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .profile-selector label {
            font-size: 0.8rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .profile-select {
            flex: 1;
            max-width: 280px;
            padding: 0.6rem 1rem;
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r2);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.875rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .profile-select:focus { border-color: var(--accent); }
        .profile-select option { background: var(--bg2); }

        .profile-hero {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .profile-hero-top {
            padding: 2rem;
            background: linear-gradient(135deg, rgba(0,212,170,0.06) 0%, transparent 60%);
            border-bottom: 1px solid var(--border2);
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .profile-big-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(0,212,170,0.12);
            border: 3px solid rgba(0,212,170,0.4);
            display: grid;
            place-items: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            flex-shrink: 0;
        }

        .profile-hero-info { flex: 1; }

        .profile-hero-name {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        .profile-hero-handle {
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .profile-hero-updated {
            font-size: 0.75rem;
            color: var(--text3);
            margin-top: 0.3rem;
        }

        .profile-rank-badge {
            background: rgba(0,212,170,0.1);
            border: 1px solid rgba(0,212,170,0.3);
            border-radius: 8px;
            padding: 0.75rem 1.25rem;
            text-align: center;
        }

        .rank-badge-num { font-size: 1.75rem; font-weight: 800; color: var(--accent); }
        .rank-badge-label { font-size: 0.65rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

        .profile-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
        }

        .pstat {
            padding: 1.5rem 1rem;
            text-align: center;
            position: relative;
        }

        .pstat + .pstat::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 1px;
            background: var(--border2);
        }

        .pstat-val { font-size: 2rem; font-weight: 800; display: block; color: var(--accent); }
        .pstat-val.easy { color: var(--easy); }
        .pstat-val.medium { color: var(--medium); }
        .pstat-val.hard { color: var(--hard); }
        .pstat-label { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.25rem; }

        /* Progress bars */
        .profile-progress {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .progress-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text2);
            margin-bottom: 1.25rem;
            font-weight: 600;
        }

        .prog-row { margin-bottom: 1rem; }
        .prog-row:last-child { margin-bottom: 0; }

        .prog-header { display: flex; justify-content: space-between; margin-bottom: 0.4rem; }
        .prog-name { font-size: 0.85rem; font-weight: 600; }
        .prog-count { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--text2); }
        .prog-track { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
        .prog-fill { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
        .prog-fill.easy { background: var(--easy); }
        .prog-fill.medium { background: var(--medium); }
        .prog-fill.hard { background: var(--hard); }

        /* Last submission card */
        .last-sub-card {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            padding: 1.5rem;
        }

        .last-sub-header { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); font-weight: 600; margin-bottom: 1rem; }

        .last-sub-content { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }

        .last-sub-left { flex: 1; min-width: 0; }

        .last-sub-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
        }

        .last-sub-title:hover { text-decoration: underline; }

        .last-sub-meta { display: flex; align-items: center; gap: 0.75rem; }

        .lang-chip {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text2);
        }

        .time-chip { font-size: 0.72rem; color: var(--text3); font-family: 'DM Mono', monospace; }

        /* ─── STATS OVERVIEW (Leaderboard top) ───────── */
        .overview-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .ov-card {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            padding: 1.25rem;
            transition: border-color 0.2s;
        }

        .ov-card:hover { border-color: var(--border); }

        .ov-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 0.4rem; }
        .ov-val { font-size: 1.75rem; font-weight: 800; color: var(--accent); }
        .ov-val.easy { color: var(--easy); }
        .ov-val.medium { color: var(--medium); }
        .ov-val.hard { color: var(--hard); }

        /* ─── MODAL ──────────────────────────────────── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            z-index: 200;
            display: grid;
            place-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s;
        }

        .overlay.open { opacity: 1; visibility: visible; }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: min(420px, 90vw);
            transform: scale(0.92);
            transition: transform 0.25s;
        }

        .overlay.open .modal { transform: scale(1); }

        .modal-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.4rem; }
        .modal-sub { font-size: 0.85rem; color: var(--text2); margin-bottom: 1.5rem; }

        .field label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.4rem; letter-spacing: 0.5px; }

        .field input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: var(--r2);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.08); }
        .field input::placeholder { color: var(--text3); }

        .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
        .modal-actions button { flex: 1; }

        .btn-cancel {
            padding: 0.75rem;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: var(--r2);
            color: var(--text2);
            font-family: 'Syne', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover { border-color: var(--text2); color: var(--text); }

        .btn-confirm {
            padding: 0.75rem;
            background: var(--accent);
            border: none;
            border-radius: var(--r2);
            color: var(--bg);
            font-family: 'Syne', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-confirm:hover { background: var(--accent2); }
        .btn-confirm:disabled { opacity: 0.6; cursor: not-allowed; }

        /* ─── TOAST ──────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.875rem 1.25rem;
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--r2);
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            z-index: 300;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(74,222,128,0.3); }
        .toast.error { border-color: rgba(248,113,113,0.3); }
        .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .toast.success .toast-dot { background: var(--easy); }
        .toast.error .toast-dot { background: var(--hard); }

        /* ─── LOADING / EMPTY ────────────────────────── */
        .loading-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 5rem 2rem;
            color: var(--text3);
            font-size: 0.9rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .empty {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text3);
        }

        .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty h3 { font-size: 1.1rem; color: var(--text2); margin-bottom: 0.5rem; }
        .empty p { font-size: 0.85rem; }

        /* ─── RESPONSIVE ─────────────────────────────── */
        @media (max-width: 768px) {
            header { padding: 1rem; }
            .nav-tabs { padding: 0 1rem; overflow-x: auto; }
            .content { padding: 1rem; }
            .podium { grid-template-columns: 1fr; }
            .podium-card.rank-1 { order: -1; }
            .overview-row { grid-template-columns: repeat(2, 1fr); }
            .profile-stats-grid { grid-template-columns: repeat(2, 1fr); }
            .profile-hero-top { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .friends-grid { grid-template-columns: 1fr; }
            .rank-row { grid-template-columns: 36px 1fr auto; }
        }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="logo">
            <div class="logo-mark">LS</div>
            <div class="logo-text">Leet<span>Seek</span></div>
        </div>
        <div class="header-right">
            <button class="refresh-btn" id="refreshBtn" title="Refresh all" onclick="refreshAll()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
            <button class="add-btn" onclick="openModal()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add User
            </button>
            <button class="add-btn logout-btn" id="logoutBtn">
                Logout
            </button>
        </div>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" data-tab="leaderboard" onclick="switchTab('leaderboard')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            Leaderboard
        </button>
        <button class="nav-tab" data-tab="friends" onclick="switchTab('friends')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            Friends
        </button>
        <button class="nav-tab" data-tab="profile" onclick="switchTab('profile')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Profile
        </button>
    </nav>

    <div class="content">

        <div class="tab-panel active" id="tab-leaderboard">
            <div class="overview-row" id="overviewRow">
                <div class="ov-card"><div class="ov-label">Total Users</div><div class="ov-val" id="ovUsers">—</div></div>
                <div class="ov-card"><div class="ov-label">Easy Solved</div><div class="ov-val easy" id="ovEasy">—</div></div>
                <div class="ov-card"><div class="ov-label">Medium Solved</div><div class="ov-val medium" id="ovMedium">—</div></div>
                <div class="ov-card"><div class="ov-label">Hard Solved</div><div class="ov-val hard" id="ovHard">—</div></div>
            </div>

            <div class="lb-header">
                <div>
                    <div class="lb-title">Rankings</div>
                    <div class="lb-subtitle">Sorted by total problems solved</div>
                </div>
            </div>

            <div class="podium" id="podium"></div>

            <div class="rank-list" id="rankList"></div>
        </div>

        <div class="tab-panel" id="tab-friends">
            <div class="lb-header" style="margin-bottom:1.5rem">
                <div>
                    <div class="lb-title">Friends</div>
                    <div class="lb-subtitle">All tracked users & their recent activity</div>
                </div>
            </div>
            <div class="friends-grid" id="friendsGrid"></div>
        </div>

        <div class="tab-panel" id="tab-profile">
            <div class="profile-selector">
                <label>Viewing</label>
                <select class="profile-select" id="profileSelect" onchange="renderProfile()">
                    <option value="">— Select a user —</option>
                </select>
            </div>
            <div id="profileContent"></div>
        </div>

    </div>
</div>

<div class="overlay" id="modal" onclick="handleOverlayClick(event)">
    <div class="modal">
        <div class="modal-title">Add LeetCode User</div>
        <div class="modal-sub">Enter a valid LeetCode username to start tracking</div>
        <div class="field">
            <label>Username</label>
            <input type="text" id="usernameInput" placeholder="e.g. neetcode" autocomplete="off">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" id="confirmBtn" onclick="addUser()">
                Add User
            </button>
        </div>
    </div>
</div>

<div class="toast" id="toast">
    <span class="toast-dot"></span>
    <span id="toastMsg"></span>
</div>

<script>
    const API_BASE = "http://localhost:8000";
    let allUsers = [];

    /* ─── DATA ─────────────────────────────────────── */
    function getTotals(user) {
        const s = user.problems_solved || {};
        const easy = s.Easy || 0;
        const medium = s.Medium || 0;
        const hard = s.Hard || 0;
        return { easy, medium, hard, total: easy + medium + hard };
    }

    function getInitial(user) {
        return (user.name || user.username || 'U')[0].toUpperCase();
    }

    function isNewActivity(user) {
        if (!user.last_submission) return false;
        const ts = new Date(user.last_submission.timestamp);
        const diffHours = (Date.now() - ts) / 3600000;
        return diffHours < 48;
    }

    function formatRelative(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        const diff = Date.now() - d;
        const mins = Math.floor(diff / 60000);
        const hrs = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        if (mins < 1) return 'just now';
        if (mins < 60) return `${mins}m ago`;
        if (hrs < 24) return `${hrs}h ago`;
        if (days < 7) return `${days}d ago`;
        return d.toLocaleDateString();
    }

    async function fetchUsers() {
        try {
            const r = await fetch(`${API_BASE}?source=list`);
            const d = await r.json();
            if (d.status === 'success') {
                allUsers = (d.users || []).sort((a, b) => getTotals(b).total - getTotals(a).total);
                renderAll();
            } else {
                showError('Failed to load users.');
            }
        } catch (e) {
            showError('Cannot connect to API. Make sure it is running.');
        }
    }

    function renderAll() {
        renderOverview();
        renderLeaderboard();
        renderFriends();
        populateProfileSelect();
    }

    /* ─── OVERVIEW ─────────────────────────────────── */
    function renderOverview() {
        let easy = 0, medium = 0, hard = 0;
        allUsers.forEach(u => {
            const t = getTotals(u);
            easy += t.easy; medium += t.medium; hard += t.hard;
        });
        document.getElementById('ovUsers').textContent = allUsers.length;
        document.getElementById('ovEasy').textContent = easy;
        document.getElementById('ovMedium').textContent = medium;
        document.getElementById('ovHard').textContent = hard;
    }

    /* ─── LEADERBOARD ──────────────────────────────── */
    function renderLeaderboard() {
        const podiumEl = document.getElementById('podium');
        const listEl = document.getElementById('rankList');

        if (allUsers.length === 0) {
            podiumEl.innerHTML = '';
            listEl.innerHTML = `<div class="empty"><div class="empty-icon">🏆</div><h3>No users yet</h3><p>Add users to see the leaderboard</p></div>`;
            return;
        }

        const maxTotal = getTotals(allUsers[0]).total || 1;
        const rankEmojis = ['🥇', '🥈', '🥉'];
        const rankClasses = ['rank-1', 'rank-2', 'rank-3'];

        // Podium for top 3
        const top3 = allUsers.slice(0, Math.min(3, allUsers.length));
        // Reorder for visual podium: 2nd, 1st, 3rd
        const podiumOrder = top3.length === 3
            ? [top3[1], top3[0], top3[2]]
            : top3.length === 2
            ? [top3[1], top3[0]]
            : [top3[0]];

        const originalIdx = podiumOrder.map(u => top3.indexOf(u));

        podiumEl.innerHTML = podiumOrder.map((user, pi) => {
            const ri = originalIdx[pi]; // 0,1,2
            const t = getTotals(user);
            return `
            <div class="podium-card ${rankClasses[ri]}">
                <div class="podium-rank">${rankEmojis[ri]}</div>
                <div class="podium-avatar">${getInitial(user)}</div>
                <div class="podium-name">${user.name || user.username}</div>
                <div class="podium-handle">@${user.username}</div>
                <div class="podium-total">${t.total}</div>
                <div class="podium-label">solved</div>
            </div>`;
        }).join('');

        // Rest of list (rank 4+)
        const rest = allUsers.slice(3);
        if (rest.length === 0) { listEl.innerHTML = ''; return; }

        listEl.innerHTML = rest.map((user, i) => {
            const t = getTotals(user);
            const pct = Math.round((t.total / maxTotal) * 100);
            return `
            <div class="rank-row" onclick="jumpToProfile('${user.username}')">
                <div class="rank-num">#${i + 4}</div>
                <div class="rank-row-info">
                    <div class="rank-avatar-sm">${getInitial(user)}</div>
                    <div>
                        <div class="rank-row-name">${user.name || user.username}</div>
                        <div class="rank-row-handle">@${user.username}</div>
                        <div class="bar-wrap" style="width:160px;max-width:100%">
                            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                        </div>
                    </div>
                </div>
                <div class="rank-row-right">
                    <div class="rank-total">${t.total}</div>
                    <div class="rank-breakdown">
                        <span class="diff-badge easy">${t.easy}E</span>
                        <span class="diff-badge medium">${t.medium}M</span>
                        <span class="diff-badge hard">${t.hard}H</span>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    /* ─── FRIENDS ──────────────────────────────────── */
    function renderFriends() {
        const grid = document.getElementById('friendsGrid');

        if (allUsers.length === 0) {
            grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">👥</div><h3>No users yet</h3><p>Add your first LeetCode user to get started</p></div>`;
            return;
        }

        grid.innerHTML = allUsers.map(user => {
            const t = getTotals(user);
            const newActivity = isNewActivity(user);
            const sub = user.last_submission;

            return `
            <div class="friend-card" onclick="jumpToProfile('${user.username}')">
                <div class="friend-card-top">
                    <div class="friend-avatar">${getInitial(user)}</div>
                    <div class="friend-meta">
                        <div class="friend-name">${user.name || user.username}</div>
                        <div class="friend-handle">@${user.username}</div>
                    </div>
                    ${newActivity ? `<div class="activity-badge">⚡ Active</div>` : ''}
                </div>
                <div class="friend-stats">
                    <div class="fstat">
                        <span class="fstat-val easy">${t.easy}</span>
                        <div class="fstat-label">Easy</div>
                    </div>
                    <div class="fstat">
                        <span class="fstat-val medium">${t.medium}</span>
                        <div class="fstat-label">Medium</div>
                    </div>
                    <div class="fstat">
                        <span class="fstat-val hard">${t.hard}</span>
                        <div class="fstat-label">Hard</div>
                    </div>
                </div>
                <div class="friend-card-bottom">
                    ${sub ? `
                    <div class="last-problem">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 11 12 14 22 4"></polyline>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                        <a class="last-problem-title" href="${sub.url}" target="_blank" onclick="event.stopPropagation()">${sub.title}</a>
                    </div>
                    ` : `<div class="last-problem" style="color:var(--text3)">No submissions yet</div>`}
                    <div class="total-chip">${t.total} solved</div>
                </div>
            </div>`;
        }).join('');
    }

    /* ─── PROFILE ──────────────────────────────────── */
    function populateProfileSelect() {
        const sel = document.getElementById('profileSelect');
        const current = sel.value;
        sel.innerHTML = '<option value="">— Select a user —</option>';
        allUsers.forEach(u => {
            sel.innerHTML += `<option value="${u.username}" ${u.username === current ? 'selected' : ''}>${u.name || u.username} (@${u.username})</option>`;
        });
        if (current) renderProfile();
    }

    function renderProfile() {
        const username = document.getElementById('profileSelect').value;
        const el = document.getElementById('profileContent');

        if (!username) {
            el.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><h3>Select a user above</h3><p>Choose a user to view their full profile</p></div>`;
            return;
        }

        const user = allUsers.find(u => u.username === username);
        if (!user) return;

        const t = getTotals(user);
        const rank = allUsers.findIndex(u => u.username === username) + 1;
        const sub = user.last_submission;
        const easyPct = t.total ? Math.round((t.easy / t.total) * 100) : 0;
        const medPct = t.total ? Math.round((t.medium / t.total) * 100) : 0;
        const hardPct = t.total ? Math.round((t.hard / t.total) * 100) : 0;

        el.innerHTML = `
        <div class="profile-hero">
            <div class="profile-hero-top">
                <div class="profile-big-avatar">${getInitial(user)}</div>
                <div class="profile-hero-info">
                    <div class="profile-hero-name">${user.name || user.username}</div>
                    <div class="profile-hero-handle">@${user.username}</div>
                    <div class="profile-hero-updated">Last updated ${formatRelative(user.last_updated)}</div>
                </div>
                <div class="profile-rank-badge">
                    <div class="rank-badge-num">#${rank}</div>
                    <div class="rank-badge-label">Rank</div>
                </div>
            </div>
            <div class="profile-stats-grid">
                <div class="pstat">
                    <span class="pstat-val">${t.total}</span>
                    <div class="pstat-label">Total</div>
                </div>
                <div class="pstat">
                    <span class="pstat-val easy">${t.easy}</span>
                    <div class="pstat-label">Easy</div>
                </div>
                <div class="pstat">
                    <span class="pstat-val medium">${t.medium}</span>
                    <div class="pstat-label">Medium</div>
                </div>
                <div class="pstat">
                    <span class="pstat-val hard">${t.hard}</span>
                    <div class="pstat-label">Hard</div>
                </div>
            </div>
        </div>

        <div class="profile-progress">
            <div class="progress-title">Problem Breakdown</div>
            <div class="prog-row">
                <div class="prog-header">
                    <span class="prog-name" style="color:var(--easy)">Easy</span>
                    <span class="prog-count">${t.easy} problems · ${easyPct}%</span>
                </div>
                <div class="prog-track"><div class="prog-fill easy" style="width:${easyPct}%"></div></div>
            </div>
            <div class="prog-row">
                <div class="prog-header">
                    <span class="prog-name" style="color:var(--medium)">Medium</span>
                    <span class="prog-count">${t.medium} problems · ${medPct}%</span>
                </div>
                <div class="prog-track"><div class="prog-fill medium" style="width:${medPct}%"></div></div>
            </div>
            <div class="prog-row">
                <div class="prog-header">
                    <span class="prog-name" style="color:var(--hard)">Hard</span>
                    <span class="prog-count">${t.hard} problems · ${hardPct}%</span>
                </div>
                <div class="prog-track"><div class="prog-fill hard" style="width:${hardPct}%"></div></div>
            </div>
        </div>

        ${sub ? `
        <div class="last-sub-card">
            <div class="last-sub-header">Last Submission</div>
            <div class="last-sub-content">
                <div class="last-sub-left">
                    <a class="last-sub-title" href="${sub.url}" target="_blank">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <line x1="10" y1="14" x2="21" y2="3"></line>
                        </svg>
                        ${sub.title}
                    </a>
                    <div class="last-sub-meta">
                        <span class="lang-chip">${sub.lang}</span>
                        <span class="time-chip">${formatRelative(sub.timestamp)}</span>
                    </div>
                </div>
            </div>
        </div>
        ` : ''}
        `;
    }

    /* ─── NAVIGATION ───────────────────────────────── */
    function switchTab(tab) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
    }

    function jumpToProfile(username) {
        const sel = document.getElementById('profileSelect');
        sel.value = username;
        switchTab('profile');
        renderProfile();
    }

    /* ─── MODAL ────────────────────────────────────── */
    function openModal() {
        document.getElementById('modal').classList.add('open');
        document.getElementById('usernameInput').focus();
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
        document.getElementById('usernameInput').value = '';
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('modal')) closeModal();
    }

    async function addUser() {
        const username = document.getElementById('usernameInput').value.trim();
        if (!username) { showToast('Please enter a username', 'error'); return; }

        const btn = document.getElementById('confirmBtn');
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div> Adding...';

        try {
            const r = await fetch(`${API_BASE}?username=${encodeURIComponent(username)}`);
            const d = await r.json();
            if (d.status === 'success') {
                showToast(`Added @${username} successfully!`, 'success');
                closeModal();
                await fetchUsers();
            } else {
                showToast(d.message || 'Failed to add user', 'error');
            }
        } catch (e) {
            showToast('Connection error', 'error');
        }

        btn.disabled = false;
        btn.innerHTML = 'Add User';
    }

    /* ─── REFRESH ──────────────────────────────────── */
    async function refreshAll() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('spinning');
        await fetchUsers();
        btn.classList.remove('spinning');
        showToast('Data refreshed', 'success');
    }

    /* ─── TOAST ────────────────────────────────────── */
    let toastTimer;
    function showToast(msg, type = 'success') {
        const el = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        el.className = `toast ${type} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    function showError(msg) {
        document.getElementById('rankList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h3>Connection Error</h3><p>${msg}</p></div>`;
        document.getElementById('friendsGrid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><h3>Connection Error</h3><p>${msg}</p></div>`;
    }

    /* ─── KEYBOARD ─────────────────────────────────── */
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) addUser();
        if (e.key === 'n' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') openModal();
    });

    /* ─── INIT ─────────────────────────────────────── */
    fetchUsers();
</script>
