<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetSeek Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
    <header>
        <div class="logo">
            <div class="logo-mark">LS</div>
            <div class="logo-text">Leet<span>Seek</span></div>
        </div>
        <div class="header-right">
            <button class="refresh-btn" id="refreshBtn" title="Refresh all">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
            <button class="add-btn" id="openModalBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Friend
            </button>
            <button class="add-btn logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" data-tab="profile">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Profile
        </button>
        <button class="nav-tab" data-tab="friends">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            Friends
        </button>
        <button class="nav-tab" data-tab="friends-lb">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            Friends Rank
        </button>
        <button class="nav-tab" data-tab="global-lb">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            Global Rank
        </button>
    </nav>

    <div class="content">
        <div class="tab-panel active" id="tab-profile">
            <div id="profileContent"></div>
        </div>

        <div class="tab-panel" id="tab-friends">
            <div class="lb-header" style="margin-bottom:1.5rem">
                <div>
                    <div class="lb-title">Friends List</div>
                    <div class="lb-subtitle">Your personal tracked network</div>
                </div>
            </div>
            <div class="friends-grid" id="friendsGrid"></div>
        </div>

        <div class="tab-panel" id="tab-friends-lb">
            <div class="lb-header">
                <div>
                    <div class="lb-title">Friends Leaderboard</div>
                    <div class="lb-subtitle">You vs. Your Friends</div>
                </div>
            </div>
            <div class="podium" id="podium-friends"></div>
            <div class="rank-list" id="rankList-friends"></div>
        </div>

        <div class="tab-panel" id="tab-global-lb">
            <div class="lb-header">
                <div>
                    <div class="lb-title">Global Leaderboard</div>
                    <div class="lb-subtitle">Everyone in the LeetSeek database</div>
                </div>
            </div>
            <div class="podium" id="podium-global"></div>
            <div class="rank-list" id="rankList-global"></div>
        </div>
    </div>
</div>

<div class="overlay" id="modal">
    <div class="modal">
        <div class="modal-title">Add a Friend</div>
        <div class="modal-sub">Enter their LeetCode username to track them.</div>
        <div class="field">
            <label>Username</label>
            <input type="text" id="usernameInput" placeholder="e.g. neetcode" autocomplete="off">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" id="cancelBtn">Cancel</button>
            <button class="btn-confirm" id="confirmBtn">Add Friend</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">
    <span class="toast-dot"></span>
    <span id="toastMsg"></span>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
