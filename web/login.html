<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LeetSeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b0f;
            --bg2: #0d1117;
            --bg3: #111820;
            --card: #0f161e;
            --border: rgba(0, 212, 170, 0.1);
            --border2: rgba(255,255,255,0.06);
            --accent: #00d4aa;
            --accent2: #00f5c4;
            --text: #e8edf2;
            --text2: #7a8899;
            --text3: #3d4e5e;
            --hard: #f87171;
            --r: 12px;
            --r2: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,212,170,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 50% 100%, rgba(0,212,170,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .auth-container {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 2.5rem;
            width: min(400px, 90vw);
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-size: 1rem;
            font-weight: 800;
            color: var(--bg);
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .logo-text span { color: var(--accent); }

        .auth-title {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .auth-sub {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text2);
            margin-bottom: 2rem;
        }

        .field { margin-bottom: 1.25rem; }
        .field label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.4rem; font-weight: 600;}
        
        .field input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: var(--r2);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }
        .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.08); }

        .btn-auth {
            width: 100%;
            padding: 0.875rem;
            background: var(--accent);
            border: none;
            border-radius: var(--r2);
            color: var(--bg);
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }
        .btn-auth:hover { background: var(--accent2); transform: translateY(-1px); }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

        .toggle-mode {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text2);
        }
        .toggle-mode span {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
        }
        .toggle-mode span:hover { text-decoration: underline; }

        #errorMsg {
            color: var(--hard);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1rem;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo">
            <div class="logo-mark">LS</div>
            <div class="logo-text">Leet<span>Seek</span></div>
        </div>
        
        <div class="auth-title" id="formTitle">Welcome Back</div>
        <div class="auth-sub" id="formSub">Sign in to view your dashboard</div>

        <form id="authForm">
            <div class="field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth" id="submitBtn">Sign In</button>
            <div id="errorMsg"></div>
        </form>

        <div class="toggle-mode">
            <span id="toggleText">Don't have an account? Sign up</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCdiwargiL5Rh4p5OAIojssI45W5xeKgPc",
            authDomain: "leetrack-38425.firebaseapp.com",
            projectId: "leetrack-38425",
            storageBucket: "leetrack-38425.firebasestorage.app",
            messagingSenderId: "874400551274",
            appId: "1:874400551274:web:fef6e6712546b9f69dd513",
            measurementId: "G-63HYYE53HE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLoginMode = true;
        
        const form = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const toggleText = document.getElementById('toggleText');
        const formTitle = document.getElementById('formTitle');
        const formSub = document.getElementById('formSub');

        // Toggle between Login and Register
        toggleText.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            errorMsg.textContent = '';
            if (isLoginMode) {
                formTitle.textContent = 'Welcome Back';
                formSub.textContent = 'Sign in to view your dashboard';
                submitBtn.textContent = 'Sign In';
                toggleText.innerHTML = "Don't have an account? <span>Sign up</span>";
            } else {
                formTitle.textContent = 'Create Account';
                formSub.textContent = 'Join to track your LeetCode friends';
                submitBtn.textContent = 'Sign Up';
                toggleText.innerHTML = "Already have an account? <span>Sign in</span>";
            }
        });

        // Handle Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Please wait...';
            errorMsg.textContent = '';

            const email = emailInput.value;
            const password = passwordInput.value;

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                // If successful, redirect to dashboard
                window.location.href = 'index.html';
            } catch (error) {
                // Remove 'Firebase:' from error messages to make them cleaner
                errorMsg.textContent = error.message.replace('Firebase: ', '');
                submitBtn.disabled = false;
                submitBtn.textContent = isLoginMode ? 'Sign In' : 'Sign Up';
            }
        });
    </script>
</body>
</html>
